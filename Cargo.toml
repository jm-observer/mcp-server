[package]
name = "mcp-server"
version = "0.1.0"
edition = "2024"

[dependencies]
path-clean = "1.0.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread", "process", "time", "io-util"] }
toml = "1.0.7"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
