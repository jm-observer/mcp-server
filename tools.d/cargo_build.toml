[config]
working_dir = "D:\\git"    # 项目根目录的父目录（需在 allowed_dirs 白名单内）

[[tools]]
name = "cargo_build"
description = "Compile a local package and all of its dependencies"
type = "command"
command = "cargo"
args = ["build"]
sub_dir = "${project}"         # 进入具体项目目录后再执行

[[tools.parameters]]
name = "project"
description = "Project directory name under working_dir"
type = "string"
required = true
# 注意：此参数没有 arg 字段，因为它不拼接到 CLI 参数里，
# 而是通过 sub_dir 模板影响工作目录

[[tools.parameters]]
name = "package"
description = "Package to build (see `cargo help pkgid`)"
type = "string"
required = false
arg = ["-p", "${package}"]

[[tools.parameters]]
name = "bin"
description = "Build only the specified binary"
type = "string"
required = false
arg = ["--bin", "${bin}"]

[[tools.parameters]]
name = "features"
description = "Comma separated list of features to activate"
type = "string"
required = false
arg = ["--features", "${features}"]

[[tools.parameters]]
name = "release"
description = "Build artifacts in release mode, with optimizations"
type = "boolean"
required = false
arg = ["--release"]

[[tools.parameters]]
name = "target"
description = "Build for the target triple"
type = "string"
required = false
arg = ["--target", "${target}"]

[[tools.parameters]]
name = "jobs"
description = "Number of parallel jobs, defaults to # of CPUs"
type = "string"
required = false
arg = ["-j", "${jobs}"]

[[tools.parameters]]
name = "all_features"
description = "Activate all available features"
type = "boolean"
required = false
arg = ["--all-features"]

[[tools.parameters]]
name = "no_default_features"
description = "Do not activate the default feature"
type = "boolean"
required = false
arg = ["--no-default-features"]

[[tools.parameters]]
name = "workspace"
description = "Build all packages in the workspace"
type = "boolean"
required = false
arg = ["--workspace"]

[[tools.parameters]]
name = "verbose"
description = "Use verbose output (-v)"
type = "boolean"
required = false
arg = ["-v"]

[[tools.parameters]]
name = "quiet"
description = "Do not print cargo log messages"
type = "boolean"
required = false
arg = ["-q"]

[[tools.parameters]]
name = "manifest_path"
description = "Path to Cargo.toml"
type = "string"
required = false
arg = ["--manifest-path", "${manifest_path}"]

[[tools.parameters]]
name = "profile"
description = "Build artifacts with the specified profile"
type = "string"
required = false
arg = ["--profile", "${profile}"]